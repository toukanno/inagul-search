name: Daily AI App Idea Generator

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install axios fs

      - name: Generate idea
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          node << 'EOF'
          const axios = require("axios");
          const fs = require("fs");

          const key = process.env.OPENROUTER_API_KEY;

          async function run() {
            const res = await axios.post(
              "https://openrouter.ai/api/v1/chat/completions",
              {
                model: "deepseek/deepseek-chat",
                messages: [
                  {
                    role: "user",
                    content: "日本語で新しいAIアプリのアイデアを1つ出してください。"
                  }
                ]
              },
              {
                headers: {
                  Authorization: `Bearer ${key}`,
                  "Content-Type": "application/json"
                }
              }
            );

            const idea = res.data.choices[0].message.content;
            const date = new Date().toISOString().slice(0,10);

            fs.mkdirSync("ideas", { recursive: true });
            fs.writeFileSync(`ideas/${date}.md`, idea);
          }

          run();
          EOF

      - name: Commit
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add ideas
          git commit -m "generate idea" || echo "no changes"
          git push
